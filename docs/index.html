# Google Docs, Sheets & Drive MCP Server

Maintained fork of `a-bonus/google-docs-mcp`, updated to behave better in stricter MCP hosts such as ChatGPT, Codex, Cursor, and Claude Desktop.

## What This Fork Optimizes

- Simpler public tool schemas
- Runtime validation for cross-field rules
- Predictable text responses with stable embedded payloads
- Stable public tool names
- Same authentication and deployment model as upstream

## Current Product Surface

This MCP server exposes tools for:

- Google Docs
- Google Sheets
- Google Drive

It supports both:

- local `stdio` usage
- remote `httpStream` deployment with FastMCP and Google OAuth

## Tool Contract

This fork follows a stricter tool contract:

1. Public inputs should stay flat and explicit whenever possible.
2. Cross-field validation should happen in handler logic instead of complex schema composition.
3. Tool outputs should return stable text content with embedded payload data instead of ad hoc prose.
4. Public tool names should remain stable.

## Setup

Use the repository `README.md` as the source of truth for:

- local setup
- OAuth authorization
- remote deployment
- MCP client configuration
- tool examples

## Example Client Configurations

### Local

```json
{
  "mcpServers": {
    "google-docs": {
      "command": "npx",
      "args": ["-y", "@a-bonus/google-docs-mcp"],
      "env": {
        "GOOGLE_CLIENT_ID": "your-client-id",
        "GOOGLE_CLIENT_SECRET": "your-client-secret"
      }
    }
  }
}
```

### Remote

```json
{
  "mcpServers": {
    "google-docs": {
      "type": "streamableHttp",
      "url": "https://your-service.run.app/mcp"
    }
  }
}
```
